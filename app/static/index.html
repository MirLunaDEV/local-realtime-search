<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local Realtime Search</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --panel: #ffffff;
        --text: #172033;
        --muted: #667085;
        --line: #d9dee8;
        --accent: #2457d6;
        --ok: #177245;
        --warn: #a15c00;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(1120px, calc(100vw - 32px));
        margin: 24px auto;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 340px;
        gap: 16px;
      }
      header {
        grid-column: 1 / -1;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
      }
      h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 700;
      }
      .subtle { color: var(--muted); }
      section, aside {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }
      .chat {
        min-height: 72vh;
        display: flex;
        flex-direction: column;
      }
      .messages {
        flex: 1;
        padding: 18px;
        overflow: auto;
      }
      .composer {
        border-top: 1px solid var(--line);
        padding: 12px;
        display: grid;
        gap: 10px;
      }
      textarea {
        width: 100%;
        min-height: 84px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px;
        font: inherit;
      }
      .controls {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      select, button {
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 6px;
        min-height: 36px;
        padding: 0 10px;
        font: inherit;
      }
      button {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
        font-weight: 650;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.55;
        cursor: wait;
      }
      .bubble {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 12px;
        background: #fff;
        white-space: pre-wrap;
      }
      .user { background: #eef4ff; border-color: #c8d7ff; }
      .answer { background: #fff; }
      .side {
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .box h2 {
        font-size: 13px;
        margin: 0 0 8px;
        text-transform: uppercase;
        letter-spacing: 0;
        color: var(--muted);
      }
      .steps {
        display: grid;
        gap: 8px;
      }
      .step {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        border: 1px solid var(--line);
        background: #fff;
      }
      .step.active .dot { background: var(--accent); border-color: var(--accent); }
      .step.done .dot { background: var(--ok); border-color: var(--ok); }
      .source {
        display: block;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 9px;
        color: var(--text);
        text-decoration: none;
        margin-bottom: 8px;
      }
      .source:hover { border-color: var(--accent); }
      .source small {
        color: var(--muted);
        display: block;
        overflow-wrap: anywhere;
      }
      .health {
        display: grid;
        gap: 6px;
      }
      .pill {
        display: flex;
        justify-content: space-between;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 7px 8px;
      }
      .status-ok { color: var(--ok); }
      .status-down, .status-degraded { color: var(--warn); }
      @media (max-width: 860px) {
        main { grid-template-columns: 1fr; }
        .chat { min-height: 60vh; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Local Realtime Search</h1>
          <div class="subtle">LM Studio-backed web research with progress, citations, and source health</div>
        </div>
        <div class="subtle">localhost</div>
      </header>

      <section class="chat">
        <div id="messages" class="messages"></div>
        <form id="form" class="composer">
          <textarea id="question" placeholder="Ask a current-info question, e.g. 오늘 날짜 알려줘 or How does SearXNG JSON work?"></textarea>
          <div class="controls">
            <select id="mode" title="Mode">
              <option value="fast">fast</option>
              <option value="balanced">balanced</option>
              <option value="deep">deep</option>
            </select>
            <select id="freshness" title="Freshness">
              <option value="">auto</option>
              <option value="day">day</option>
              <option value="week">week</option>
              <option value="month">month</option>
              <option value="year">year</option>
            </select>
            <button id="ask" type="submit">Ask</button>
          </div>
        </form>
      </section>

      <aside class="side">
        <div class="box">
          <h2>Progress</h2>
          <div id="steps" class="steps"></div>
        </div>
        <div class="box">
          <h2>Sources</h2>
          <div id="sources" class="subtle">No sources yet.</div>
        </div>
        <div class="box">
          <h2>Provider Health</h2>
          <div id="health" class="subtle">No provider data yet.</div>
        </div>
      </aside>
    </main>

    <script>
      const form = document.querySelector("#form");
      const question = document.querySelector("#question");
      const mode = document.querySelector("#mode");
      const freshness = document.querySelector("#freshness");
      const ask = document.querySelector("#ask");
      const messages = document.querySelector("#messages");
      const steps = document.querySelector("#steps");
      const sources = document.querySelector("#sources");
      const health = document.querySelector("#health");
      const order = ["planning", "searching", "fetching", "synthesizing"];

      function setSteps(active) {
        steps.innerHTML = order.map((name) => {
          const className = order.indexOf(name) < order.indexOf(active) ? "done" : name === active ? "active" : "";
          return `<div class="step ${className}"><span class="dot"></span><span>${name}</span></div>`;
        }).join("");
      }

      function addBubble(text, cls) {
        const node = document.createElement("div");
        node.className = `bubble ${cls || ""}`;
        node.textContent = text;
        messages.appendChild(node);
        messages.scrollTop = messages.scrollHeight;
      }

      function renderSources(items) {
        if (!items.length) {
          sources.textContent = "No sources for this answer.";
          return;
        }
        sources.innerHTML = items.map((source) => {
          const title = source.title || source.url || "Untitled source";
          const url = source.url || "#";
          const label = source.source_label || "source";
          return `<a class="source" href="${url}" target="_blank" rel="noreferrer">${title}<small>${label} · ${url}</small></a>`;
        }).join("");
      }

      function renderHealth(items) {
        if (!items.length) {
          health.textContent = "Direct answer; no provider calls.";
          return;
        }
        health.innerHTML = items.map((item) => {
          const status = item.status || "unknown";
          return `<div class="pill"><span>${item.provider}</span><span class="status-${status}">${status} · ${item.result_count} results</span></div>`;
        }).join("");
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const q = question.value.trim();
        if (!q) return;
        ask.disabled = true;
        setSteps("planning");
        sources.textContent = "Waiting for sources...";
        health.textContent = "Waiting for provider health...";
        addBubble(q, "user");

        const params = new URLSearchParams({ question: q, mode: mode.value });
        if (freshness.value) params.set("freshness", freshness.value);
        const events = new EventSource(`/ask/stream?${params.toString()}`);

        events.addEventListener("status", (event) => {
          const data = JSON.parse(event.data);
          setSteps(data.label);
        });
        events.addEventListener("sources", (event) => {
          renderSources(JSON.parse(event.data).sources || []);
        });
        events.addEventListener("answer", (event) => {
          const data = JSON.parse(event.data);
          addBubble(data.answer || "", "answer");
          renderHealth(data.provider_health || []);
        });
        events.addEventListener("done", () => {
          order.forEach((name) => void name);
          setSteps("synthesizing");
          [...steps.children].forEach((node) => node.classList.add("done"));
          ask.disabled = false;
          events.close();
        });
        events.onerror = () => {
          addBubble("Request failed or stream closed unexpectedly.", "answer");
          ask.disabled = false;
          events.close();
        };
      });

      setSteps("planning");
    </script>
  </body>
</html>
